name: 🚀 Feature Request (English)
description: Have an idea or proposal? Pitch it!
title: "[Feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 💡 Feature Proposal
        Help improve MultiMDReader by sharing your ideas for new features or enhancements.

  - type: dropdown
    id: category
    attributes:
      label: 🏷️ Category
      options:
        - ✨ New Reading/Editor Feature
        - 🎨 UI / Design Improvement
        - ⚡ Performance / Optimization
        - 🌐 Translation / New Language
        - 🖥️ Desktop / OS Integration
        - 🔧 Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 What is your idea?
      description: Describe your proposal in detail. How should it work?
      placeholder: "I would love to see a feature that allows users to..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤝 What problem does it solve or improve?
      description: Why is this feature needed? What workflow would it make faster or easier?
      placeholder: "Currently, it is difficult or cumbersome to..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🎨 Mockups / Screenshots / Extras
      description: Drag & drop images, sketches, or diagrams here if you have them!
