name: 🐛 Bug Report (English)
description: Something is broken? Help us fix it!
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛠️ Bug Report
        Thank you for reporting! Please fill out the form below with as much detail as possible.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I am using the [latest release](https://github.com/PiBOH/multimdreader/releases/latest) of MultiMDReader.
          required: true
        - label: I have searched existing issues and verified this is not a duplicate.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 📍 Where do you believe the bug is?
      description: Select the area of the application where you encounter the issue.
      options:
        - 🔤 Markdown Rendering / Parsers (GFM, Tables, Lists)
        - 🎨 Code Syntax / Highlighting (Highlight.js)
        - 🌐 Translations / Language Switching (i18n)
        - 🌙 Dark / Light Mode
        - 📂 Sidebar / Recent Files History
        - 🖱️ Drag & Drop / File Opening
        - 🖥️ Tauri Desktop Integration (Double click, file association)
        - 💽 Builds / Downloads (.exe, .dmg, .deb, .AppImage, .pkg.tar.zst)
        - ❓ Other
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 📉 How frequently does it occur?
      options:
        - 🔴 Always (100%)
        - 🟠 Often (> 50%)
        - 🟡 Sometimes (< 50%)
        - 🟢 Rarely (Once or twice)
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 🔄 Steps to reproduce the bug
      description: Clear, precise steps lead to a faster fix!
      placeholder: |
        1. Open the app in environment...
        2. Click on...
        3. Select file...
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: 🆚 Expected behavior vs. Actual behavior
      description: What should have happened vs. what actually happened.
      placeholder: |
        Expected: The Markdown file is displayed correctly.
        Actual: The application shows a file read error or stays on the welcome screen.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: dropdown
    id: os-ver
    attributes:
      label: 💻 Operating System / Environment?
      options:
        - 🪟 Windows 11
        - 🪟 Windows 10
        - 🪟 Windows 8 / 8.1
        - 🪟 Windows 7
        - 🍎 macOS (Apple Silicon M1/M2/M3...)
        - 🍎 macOS (Intel)
        - 🐧 Linux (Debian / Ubuntu / derivatives)
        - 🐧 Linux (Arch Linux / Manjaro / derivatives)
        - 🐧 Linux (Other distro / AppImage)
        - 🌐 Web Demo / Dashboard (Browser)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: 📦 App Version
      placeholder: e.g. 0.0.8_BETA5 (Check the badge in the 'About' dialog or the file name)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs / Screenshots
      description: Paste logs/error messages or drag & drop screenshots here.
      render: shell
