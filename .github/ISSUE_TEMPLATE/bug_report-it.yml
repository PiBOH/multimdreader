name: 🐛 Segnalazione Bug (Italiano)
description: Qualcosa non funziona? Aiutaci a risolverlo!
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛠️ Segnalazione Bug
        Grazie per la segnalazione! Compila il modulo sottostante con il maggior numero di dettagli possibile.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checklist
      options:
        - label: Utilizzo [l'ultima versione](https://github.com/PiBOH/multimdreader/releases/latest) di MultiMDReader.
          required: true
        - label: Ho verificato e non esiste un'altra issue simile già aperta.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 📍 Dove credi che sia il bug?
      description: Seleziona l'area dell'applicazione in cui riscontri il problema.
      options:
        - 🔤 Markdown Rendering / Parsers (GFM, Tabelle, Liste)
        - 🎨 Sintassi / Evidenziazione Codice (Highlight.js)
        - 🌐 Traduzioni / Cambio Lingua (i18n)
        - 🌙 Dark / Light Mode
        - 📂 Sidebar / Storico File Recenti
        - 🖱️ Drag & Drop / Apertura File
        - 🖥️ Integrazione Desktop Tauri (Doppio click, file association)
        - 💽 Build / Download (.exe, .dmg, .deb, .AppImage, .pkg.tar.zst)
        - ❓ Altro
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 📉 Con che frequenza accade?
      options:
        - 🔴 Sempre (100%)
        - 🟠 Spesso (> 50%)
        - 🟡 A volte (< 50%)
        - 🟢 Raramente (Una o due volte in tutto)
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 🔄 Passaggi fatti prima di inciampare nel bug
      description: Descrivi in modo chiaro le azioni compiute per aiutarci a riprodurre e risolvere il problema in tempi record!
      placeholder: |
        1. Apri l'app in ambiente...
        2. Fai clic su...
        3. Seleziona il file...
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: 🆚 Cosa dovrebbe succedere vs. Cosa succede
      description: Qual era il comportamento atteso e cosa si è verificato invece.
      placeholder: |
        Aspettativa: Il file Markdown viene visualizzato correttamente.
        Realtà: L'applicazione mostra un messaggio di errore di lettura o rimane nella schermata di benvenuto.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: dropdown
    id: os-ver
    attributes:
      label: 💻 Sistema Operativo / Ambiente di Esecuzione?
      options:
        - 🪟 Windows 11
        - 🪟 Windows 10
        - 🪟 Windows 8 / 8.1
        - 🪟 Windows 7
        - 🍎 macOS (Apple Silicon M1/M2/M3...)
        - 🍎 macOS (Intel)
        - 🐧 Linux (Debian / Ubuntu / derivate)
        - 🐧 Linux (Arch Linux / Manjaro / derivate)
        - 🐧 Linux (Altra distro / AppImage)
        - 🌐 Web Demo / Dashboard (Browser)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: 📦 App Version
      placeholder: e.g. 0.0.8_BETA5 (Controlla il badge nella finestra 'About' o il nome del file installato)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs / Screenshots
      description: Incolla log o messaggi d'errore, oppure trascina qui uno screenshot del problema.
      render: shell
