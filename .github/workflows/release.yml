name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Windows Build ──────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npx @tauri-apps/cli icon public/icon.png
        continue-on-error: true

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MultiMDReader ${{ github.ref_name }}'
          releaseBody: |
            ## MultiMDReader ${{ github.ref_name }}

            🔤 A cross-platform Markdown file reader. No installation required.

            ### 📥 Downloads

            | Platform | File | Instructions |
            |----------|------|-------------|
            | **Windows** | `MultiMDReader_*_x64-setup.exe` | Double-click to install & run |
            | **Windows (Portable)** | `multimdreader.exe` | Just run the .exe — no install needed |
            | **macOS (Intel)** | `MultiMDReader_*_x64.dmg` | Open .dmg → drag to Applications |
            | **macOS (Apple Silicon)** | `MultiMDReader_*_aarch64.dmg` | Open .dmg → drag to Applications |
            | **Linux (Debian/Ubuntu)** | `MultiMDReader_*_amd64.deb` | `sudo dpkg -i *.deb` |
            | **Linux (All distros)** | `MultiMDReader_*_amd64.AppImage` | `chmod +x && ./MultiMDReader_*.AppImage` |
            | **Linux (Arch)** | `multimdreader-*.pkg.tar.zst` | `sudo pacman -U *.pkg.tar.zst` |

            ### 🌐 Supported Languages
            🇮🇹 Italiano · 🇬🇧 English (UK) · 🇺🇸 English (US) · 🇪🇸 Español · 🇩🇪 Deutsch · 🇫🇷 Français

            ---
            Author: [PiBOH](https://piboh.github.io/) · Repository: [GitHub](https://github.com/PiBOH/multimdreader)
          releaseDraft: true
          prerelease: false

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: multimdreader-windows-portable
          path: src-tauri/target/release/multimdreader.exe
          retention-days: 30

  # ─── macOS Build (Intel + Apple Silicon) ────────────────────
  build-macos:
    name: Build macOS (${{ matrix.suffix }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: x64
          - target: aarch64-apple-darwin
            suffix: aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npx @tauri-apps/cli icon public/icon.png
        continue-on-error: true

      - name: Build Tauri app (macOS - ${{ matrix.suffix }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MultiMDReader ${{ github.ref_name }}'
          releaseBody: 'See release assets below.'
          releaseDraft: true
          prerelease: false
          args: '--target ${{ matrix.target }}'

  # ─── Linux Build ────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npx @tauri-apps/cli icon public/icon.png
        continue-on-error: true

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MultiMDReader ${{ github.ref_name }}'
          releaseBody: 'See release assets below.'
          releaseDraft: true
          prerelease: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multimdreader-linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  # ─── Arch Linux Package ────────────────────────────────────
  build-arch:
    name: Build Arch Linux Package
    runs-on: ubuntu-latest
    needs: build-linux
    container:
      image: archlinux:latest
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel binutils fakeroot sudo

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: multimdreader-linux-artifacts
          path: artifacts/

      - name: Create Arch package directory
        run: |
          mkdir -p /tmp/multimdreader-pkg/src

          # Copy AppImage
          APPIMAGE=$(find artifacts/ -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" /tmp/multimdreader-pkg/src/MultiMDReader.AppImage
          fi

      - name: Create PKGBUILD and build
        run: |
          # Extract version from tag or use default
          VERSION="0.0.3"
          
          cat > /tmp/multimdreader-pkg/PKGBUILD << PKGBUILDEOF
          pkgname=multimdreader-bin
          pkgver=$VERSION
          pkgrel=1
          pkgdesc="A cross-platform Markdown file reader — AppImage binary"
          arch=('x86_64')
          url="https://github.com/PiBOH/multimdreader"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3')
          provides=('multimdreader')
          conflicts=('multimdreader')
          source=("MultiMDReader.AppImage")
          sha256sums=('SKIP')

          package() {
              install -Dm755 "\$srcdir/MultiMDReader.AppImage" "\$pkgdir/usr/bin/multimdreader"
              install -Dm644 /dev/stdin "\$pkgdir/usr/share/applications/multimdreader.desktop" << DESKTOP
          [Desktop Entry]
          Name=MultiMDReader
          Comment=Cross-Platform Markdown Reader
          Exec=multimdreader %F
          Icon=multimdreader
          Terminal=false
          Type=Application
          Categories=Office;TextEditor;Viewer;
          MimeType=text/markdown;text/x-markdown;
          DESKTOP
          }
          PKGBUILDEOF

          cd /tmp/multimdreader-pkg

          useradd -m builduser
          echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builduser:builduser /tmp/multimdreader-pkg
          su - builduser -c "cd /tmp/multimdreader-pkg && makepkg -sf --noconfirm"

          find /tmp/multimdreader-pkg -name "*.pkg.tar.zst" -exec cp {} /tmp/ \;

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: multimdreader-arch-package
          path: /tmp/*.pkg.tar.zst
          retention-days: 30

  # ─── Combine Release ───────────────────────────────────────
  combine-release:
    name: Combine Release Assets
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux, build-arch]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: List all artifacts
        run: find all-artifacts/ -type f | head -50

      - name: Upload Arch package to release
        uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/multimdreader-arch-package/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
