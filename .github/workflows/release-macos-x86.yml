name: Release macOS (x86)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-x86-notice:
    name: "⚠️ macOS 32-bit is not available"
    runs-on: ubuntu-latest
    steps:
      - name: Document macOS 32-bit deprecation
        run: |
          echo "=============================================="
          echo "⚠️  macOS 32-bit builds are NOT POSSIBLE"
          echo "=============================================="
          echo ""
          echo "Apple dropped 32-bit application support in macOS 10.15 Catalina (2019)."
          echo "The Rust compiler has no i686 target for macOS (darwin)."
          echo "All modern Macs (Intel and Apple Silicon) are 64-bit only."
          echo ""
          echo "This workflow exists as a placeholder to document this limitation."
          echo "No build artifacts will be produced."
          echo "=============================================="
