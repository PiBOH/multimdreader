name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (Debian + AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Tauri icons
        run: npx tauri icon public/icon.png
        continue-on-error: true

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MultiMDReader ${{ github.ref_name }}'
          releaseBody: 'See release assets below.'
          releaseDraft: true
          prerelease: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multimdreader-linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  # ─── Arch Linux Package ────────────────────────────────────
  build-arch:
    name: Build Arch Linux Package
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: multimdreader-linux-artifacts
          path: artifacts/

      - name: Build Arch package
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:latest
          options: -v ${{ github.workspace }}/artifacts:/artifacts
          run: |
            pacman -Syu --noconfirm
            pacman -S --noconfirm base-devel binutils fakeroot sudo

            # Create package directory
            mkdir -p /tmp/multimdreader-pkg/src

            # Copy AppImage
            APPIMAGE=$(find /artifacts/ -name "*.AppImage" | head -1)
            if [ -n "$APPIMAGE" ]; then
              cp "$APPIMAGE" /tmp/multimdreader-pkg/src/MultiMDReader.AppImage
              chmod +x /tmp/multimdreader-pkg/src/MultiMDReader.AppImage
            else
              echo "ERROR: No AppImage found in artifacts"
              exit 1
            fi

            # Extract version from tag
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            if [ -z "$VERSION" ] || [ "$VERSION" = "$TAG" ]; then
              VERSION="0.0.3"
            fi

            # Create PKGBUILD
            cat > /tmp/multimdreader-pkg/PKGBUILD << PKGBUILDEOF
            pkgname=multimdreader-bin
            pkgver=$VERSION
            pkgrel=1
            pkgdesc="A cross-platform Markdown file reader — AppImage binary"
            arch=('x86_64')
            url="https://github.com/PiBOH/multimdreader"
            license=('MIT')
            depends=('webkit2gtk-4.1' 'gtk3')
            provides=('multimdreader')
            conflicts=('multimdreader')
            source=("MultiMDReader.AppImage")
            sha256sums=('SKIP')

            package() {
                install -Dm755 "\$srcdir/MultiMDReader.AppImage" "\$pkgdir/usr/bin/multimdreader"
                install -Dm644 /dev/stdin "\$pkgdir/usr/share/applications/multimdreader.desktop" << DESKTOP
            [Desktop Entry]
            Name=MultiMDReader
            Comment=Cross-Platform Markdown Reader
            Exec=multimdreader %F
            Icon=multimdreader
            Terminal=false
            Type=Application
            Categories=Office;TextEditor;Viewer;
            MimeType=text/markdown;text/x-markdown;
            DESKTOP
            }
            PKGBUILDEOF

            cd /tmp/multimdreader-pkg

            # Build as non-root user (makepkg requirement)
            useradd -m builduser
            echo "builduser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
            chown -R builduser:builduser /tmp/multimdreader-pkg
            su - builduser -c "cd /tmp/multimdreader-pkg && makepkg -sf --noconfirm"

            # Copy result to artifacts
            find /tmp/multimdreader-pkg -name "*.pkg.tar.zst" -exec cp {} /artifacts/ \;

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: multimdreader-arch-package
          path: artifacts/*.pkg.tar.zst
          retention-days: 30

      - name: Upload Arch package to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
