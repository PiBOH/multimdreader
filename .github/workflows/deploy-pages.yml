name: deploy-pages.yml

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/release-*.yml'
      - 'src-tauri/**'
      - 'PKGBUILD'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Deploy Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # ─── Build demo app → /demo/ ─────────────────────
      - name: Build demo app
        run: npm run build
        env:
          VITE_BASE: /multimdreader/demo/

      # ─── Assemble combined deploy folder ──────────────
      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/demo
          # Dashboard at root
          cp -r dashboard/* deploy/
          # Demo app in /demo/
          cp -r dist/* deploy/demo/
          # .nojekyll
          touch deploy/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy/

  deploy:
    name: Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
