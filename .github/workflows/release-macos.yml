name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.suffix }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            suffix: x64
          - target: aarch64-apple-darwin
            suffix: aarch64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Tauri icons
        run: npx tauri icon public/icon.png
        continue-on-error: true

      - name: Build Tauri app (macOS - ${{ matrix.suffix }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MultiMDReader ${{ github.ref_name }}'
          releaseBody: 'See release assets below.'
          releaseDraft: true
          prerelease: false
          args: '--target ${{ matrix.target }}'

      - name: Upload macOS artifacts (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: multimdreader-macos-${{ matrix.suffix }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 30
